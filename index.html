<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DLsite Creator Dashboard</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, set, get, onValue, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCkGabMQeQ2uB5RCLo3ndywW-SVuEGFuag",
    authDomain: "dlsite-dashboard.firebaseapp.com",
    projectId: "dlsite-dashboard",
    databaseURL: "https://dlsite-dashboard-default-rtdb.firebaseio.com",
    storageBucket: "dlsite-dashboard.firebasestorage.app",
    messagingSenderId: "929548729421",
    appId: "1:929548729421:web:b8eee9783dc61d7f493004"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  // グローバルに公開
  window.firebaseDb = db;
  window.firebaseRef = ref;
  window.firebaseSet = set;
  window.firebaseGet = get;
  window.firebaseOnValue = onValue;
  window.firebasePush = push;

  // Firebase からデータをリアルタイム同期
  onValue(ref(db, 'dashboard'), (snapshot) => {
    const data = snapshot.val();
    if (data) {
      window.state = {
        works: data.works || {},
        snapshots: data.snapshots ? Object.values(data.snapshots) : []
      };
    } else {
      window.state = { works: {}, snapshots: [] };
    }
    renderAll();
  });
</script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=JetBrains+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0a0a0f;
    --bg2: #111118;
    --bg3: #1a1a24;
    --border: #2a2a3a;
    --accent: #e8407a;
    --accent2: #7b4fff;
    --accent3: #00d4aa;
    --text: #e8e8f0;
    --text2: #8888aa;
    --gold: #f5c842;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    min-height: 100vh;
  }

  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,10,15,0.95);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex; align-items: center; justify-content: space-between;
    height: 60px;
  }

  .logo { display: flex; align-items: center; gap: 10px; font-weight: 900; font-size: 1.1rem; }
  .logo-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--accent); box-shadow: 0 0 12px var(--accent);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 12px var(--accent); }
    50% { box-shadow: 0 0 24px var(--accent), 0 0 40px var(--accent); }
  }

  .header-right { display: flex; align-items: center; gap: 1rem; }
  .last-update { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--text2); }

  .btn {
    padding: 0.4rem 1rem; border-radius: 6px; border: 1px solid var(--border);
    background: var(--bg3); color: var(--text); cursor: pointer;
    font-family: inherit; font-size: 0.8rem; transition: all 0.2s;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn-primary { background: var(--accent); border-color: var(--accent); color: white; }
  .btn-primary:hover { background: #ff5590; color: white; }

  main { max-width: 1400px; margin: 0 auto; padding: 2rem; }

  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 2rem; }

  .stat-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: 12px; padding: 1.2rem 1.5rem;
    position: relative; overflow: hidden; transition: border-color 0.2s;
  }
  .stat-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0;
    height: 2px; background: var(--accent-color, var(--accent));
  }
  .stat-card:hover { border-color: var(--accent-color, var(--accent)); }
  .stat-label { font-size: 0.75rem; color: var(--text2); margin-bottom: 0.5rem; letter-spacing: 0.08em; text-transform: uppercase; }
  .stat-value { font-family: 'JetBrains Mono', monospace; font-size: 2rem; font-weight: 700; }
  .stat-delta { font-size: 0.75rem; margin-top: 0.3rem; }
  .stat-delta.up { color: var(--accent3); }
  .stat-delta.down { color: var(--accent); }

  .main-grid { display: grid; grid-template-columns: 1fr 380px; gap: 1.5rem; margin-bottom: 1.5rem; }

  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .card-header {
    padding: 1rem 1.5rem; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .card-title { font-size: 0.85rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; color: var(--text2); }
  .card-body { padding: 1.5rem; }

  .tabs { display: flex; gap: 0.5rem; }
  .tab {
    padding: 0.3rem 0.8rem; border-radius: 6px; font-size: 0.75rem;
    cursor: pointer; border: 1px solid var(--border); background: transparent;
    color: var(--text2); font-family: inherit; transition: all 0.2s;
  }
  .tab.active { background: var(--accent); border-color: var(--accent); color: white; }

  .works-table { width: 100%; border-collapse: collapse; }
  .works-table th {
    text-align: left; font-size: 0.7rem; color: var(--text2);
    text-transform: uppercase; letter-spacing: 0.08em;
    padding: 0.6rem 0.8rem; border-bottom: 1px solid var(--border);
  }
  .works-table td { padding: 0.7rem 0.8rem; font-size: 0.85rem; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .works-table tr:hover td { background: rgba(255,255,255,0.03); }

  .rank-badge {
    font-family: 'JetBrains Mono', monospace; font-size: 0.75rem;
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center; font-weight: 700;
  }
  .rank-1 { background: rgba(245,200,66,0.15); color: var(--gold); border: 1px solid var(--gold); }
  .rank-2 { background: rgba(180,180,200,0.1); color: #c0c0d0; border: 1px solid #555; }
  .rank-3 { background: rgba(200,120,80,0.1); color: #cd7f50; border: 1px solid #8b5030; }
  .rank-other { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }

  .work-title-cell { max-width: 220px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 700; }
  .work-id { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--text2); display: block; margin-top: 2px; }
  .num-cell { font-family: 'JetBrains Mono', monospace; font-weight: 700; }

  .delta-pill { display: inline-block; padding: 0.1rem 0.4rem; border-radius: 4px; font-size: 0.7rem; font-family: 'JetBrains Mono', monospace; }
  .delta-up { background: rgba(0,212,170,0.1); color: var(--accent3); }
  .delta-zero { color: var(--text2); }
  .delta-down { background: rgba(232,64,122,0.1); color: var(--accent); }

  .chart-container { position: relative; height: 260px; }

  .ranking-list { display: flex; flex-direction: column; gap: 0.6rem; }
  .rank-item {
    display: flex; align-items: center; gap: 0.8rem;
    padding: 0.6rem; border-radius: 8px; background: var(--bg3); transition: background 0.2s;
  }
  .rank-item:hover { background: var(--bg); }
  .rank-info { flex: 1; min-width: 0; }
  .rank-name { font-size: 0.82rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .rank-sub { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--text2); margin-top: 2px; }
  .rank-sales { font-family: 'JetBrains Mono', monospace; font-size: 1rem; font-weight: 700; color: var(--accent3); white-space: nowrap; }

  .input-panel {
    position: fixed; right: 0; top: 0; bottom: 0; width: 480px;
    background: var(--bg2); border-left: 1px solid var(--border);
    z-index: 200; transform: translateX(100%);
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex; flex-direction: column;
  }
  .input-panel.open { transform: translateX(0); }
  .panel-header {
    padding: 1.2rem 1.5rem; border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between; flex-shrink: 0;
  }
  .panel-body { flex: 1; overflow-y: auto; padding: 1.5rem; }

  .form-group { margin-bottom: 1.2rem; }
  .form-label { display: block; font-size: 0.75rem; color: var(--text2); margin-bottom: 0.4rem; text-transform: uppercase; letter-spacing: 0.06em; }
  .form-input {
    width: 100%; background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 0.6rem 0.8rem; color: var(--text);
    font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; transition: border-color 0.2s;
  }
  .form-input:focus { outline: none; border-color: var(--accent2); }
  .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; }

  .work-entry { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 1rem; margin-bottom: 0.8rem; }
  .work-entry-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.8rem; }
  .work-entry-title { font-size: 0.85rem; font-weight: 700; }

  .section-title { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text2); margin-bottom: 0.8rem; padding-bottom: 0.4rem; border-bottom: 1px solid var(--border); }

  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 190; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
  .overlay.show { opacity: 1; pointer-events: auto; }

  .empty-state { text-align: center; padding: 3rem; color: var(--text2); }
  .empty-state .emoji { font-size: 2.5rem; margin-bottom: 0.8rem; }
  .empty-state p { font-size: 0.9rem; margin-bottom: 1.2rem; }

  .toast {
    position: fixed; bottom: 2rem; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--bg3); border: 1px solid var(--border);
    border-left: 3px solid var(--accent3);
    padding: 0.8rem 1.5rem; border-radius: 8px; font-size: 0.85rem;
    z-index: 999; transition: transform 0.3s; white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .firebase-status {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 0.72rem; color: var(--text2);
  }
  .firebase-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent3); }

  @media (max-width: 1100px) { .main-grid { grid-template-columns: 1fr; } .stats-grid { grid-template-columns: repeat(2, 1fr); } }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    DLsite Dashboard
  </div>
  <div class="header-right">
    <div class="firebase-status">
      <div class="firebase-dot"></div>
      Firebase同期中
    </div>
    <span class="last-update" id="lastUpdate">読み込み中...</span>
    <button class="btn" onclick="togglePanel()">📝 データ入力</button>
    <button class="btn btn-primary" onclick="exportCSV()">📊 CSV出力</button>
  </div>
</header>

<main>
  <div class="stats-grid">
    <div class="stat-card" style="--accent-color: var(--accent3)">
      <div class="stat-label">総販売本数</div>
      <div class="stat-value" id="totalSales">—</div>
      <div class="stat-delta" id="totalSalesDelta"></div>
    </div>
    <div class="stat-card" style="--accent-color: var(--accent)">
      <div class="stat-label">総お気に入り数</div>
      <div class="stat-value" id="totalFav">—</div>
      <div class="stat-delta" id="totalFavDelta"></div>
    </div>
    <div class="stat-card" style="--accent-color: var(--accent2)">
      <div class="stat-label">作品数</div>
      <div class="stat-value" id="totalWorks">—</div>
      <div class="stat-delta"></div>
    </div>
    <div class="stat-card" style="--accent-color: var(--gold)">
      <div class="stat-label">記録数</div>
      <div class="stat-value" id="totalSnapshots">—</div>
      <div class="stat-delta" style="color: var(--text2)" id="snapshotSub"></div>
    </div>
  </div>

  <div class="main-grid">
    <div style="display: flex; flex-direction: column; gap: 1.5rem;">
      <div class="card">
        <div class="card-header">
          <span class="card-title">推移グラフ</span>
          <div style="display:flex; gap:0.8rem; align-items:center;">
            <select id="chartWorkSelect" class="form-input" style="width:auto; padding: 0.3rem 0.6rem; font-size: 0.75rem; font-family: inherit;" onchange="renderChart()">
              <option value="__all__">全作品合計</option>
            </select>
            <div class="tabs">
              <button class="tab active" onclick="setMetric('sales', this)">販売数</button>
              <button class="tab" onclick="setMetric('fav', this)">お気に入り</button>
            </div>
          </div>
        </div>
        <div class="card-body">
          <div class="chart-container"><canvas id="mainChart"></canvas></div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <span class="card-title">作品一覧</span>
          <div class="tabs">
            <button class="tab active" onclick="setSortTable('sales', this)">販売数順</button>
            <button class="tab" onclick="setSortTable('fav', this)">お気に入り順</button>
            <button class="tab" onclick="setSortTable('delta', this)">伸び順</button>
          </div>
        </div>
        <div class="card-body" style="padding: 0;">
          <div id="worksTableContainer">
            <div class="empty-state">
              <div class="emoji">🎮</div>
              <p>Firebase からデータを読み込み中...</p>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div style="display: flex; flex-direction: column; gap: 1.5rem;">
      <div class="card">
        <div class="card-header"><span class="card-title">販売数 TOP 5</span></div>
        <div class="card-body">
          <div class="ranking-list" id="rankingList">
            <div style="color: var(--text2); font-size: 0.82rem; text-align:center; padding: 1rem 0;">読み込み中...</div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-header"><span class="card-title">最新スナップショット</span></div>
        <div class="card-body">
          <div id="recentList" style="font-size: 0.8rem; color: var(--text2);">読み込み中...</div>
        </div>
      </div>

      <div class="card">
        <div class="card-header"><span class="card-title">Chrome拡張との連携</span></div>
        <div class="card-body">
          <div style="background: rgba(123,79,255,0.1); border: 1px solid rgba(123,79,255,0.3); border-radius: 8px; padding: 1rem; font-size: 0.8rem; color: var(--text2); line-height: 1.7;">
            <strong style="color: var(--accent2);">拡張機能の使い方：</strong><br>
            1. DLsiteの作品ページを開く<br>
            2. 拡張アイコンをクリック<br>
            3. <strong style="color:var(--accent2);">「キャプチャ」</strong>ボタンで自動取得<br>
            4. このページに自動反映される<br><br>
            <span style="color: var(--accent3);">✓ Firebaseでリアルタイム同期</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<!-- Input Panel -->
<div class="overlay" id="overlay" onclick="togglePanel()"></div>
<div class="input-panel" id="inputPanel">
  <div class="panel-header">
    <span style="font-weight: 700; font-size: 0.95rem;">📝 データ入力</span>
    <button class="btn" onclick="togglePanel()">✕ 閉じる</button>
  </div>
  <div class="panel-body">
    <div class="section-title">スナップショット追加</div>
    <div class="form-group">
      <label class="form-label">記録日時</label>
      <input type="datetime-local" class="form-input" id="snapDate">
    </div>
    <div id="workEntries"></div>
    <button class="btn btn-primary" onclick="saveSnapshot()" style="width:100%; margin-bottom: 2rem;">💾 Firebaseに保存</button>

    <div class="section-title">作品登録</div>
    <div class="form-group">
      <label class="form-label">作品ID (例: RJ123456)</label>
      <input type="text" class="form-input" id="newWorkId" placeholder="RJxxxxxxx">
    </div>
    <div class="form-group">
      <label class="form-label">作品タイトル</label>
      <input type="text" class="form-input" id="newWorkTitle" placeholder="作品名を入力">
    </div>
    <button class="btn" onclick="registerWork()" style="width:100%; margin-bottom: 2rem;">作品を登録</button>

    <div class="section-title" style="color: var(--accent)">危険な操作</div>
    <button class="btn" onclick="clearAllData()" style="width:100%; border-color: var(--accent); color: var(--accent);">🗑️ 全データ削除</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
window.state = { works: {}, snapshots: [] };
let chartInstance = null;
let currentMetric = 'sales';
let currentSort = 'sales';

const COLORS = ['#e8407a','#7b4fff','#00d4aa','#f5c842','#ff7043','#29b6f6','#ab47bc','#66bb6a'];

function toast(msg, duration = 2500) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), duration);
}

function escapeHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function getWorkColor(workId) {
  const works = Object.keys(window.state.works);
  return COLORS[works.indexOf(workId) % COLORS.length];
}

// Firebase 保存
async function saveToFirebase(path, data) {
  if (!window.firebaseDb) return;
  await window.firebaseSet(window.firebaseRef(window.firebaseDb, path), data);
}

async function registerWork() {
  const id = document.getElementById('newWorkId').value.trim().toUpperCase();
  const title = document.getElementById('newWorkTitle').value.trim();
  if (!id || !title) { toast('⚠️ IDとタイトルを入力してください'); return; }
  if (window.state.works[id]) { toast('⚠️ この作品IDは既に登録されています'); return; }

  await saveToFirebase(`dashboard/works/${id}`, { id, title });
  document.getElementById('newWorkId').value = '';
  document.getElementById('newWorkTitle').value = '';
  toast(`✅ 「${title}」を登録しました`);
  populateWorkEntries();
}

async function saveSnapshot() {
  const ts = document.getElementById('snapDate').value;
  if (!ts) { toast('⚠️ 日時を入力してください'); return; }

  const works = Object.values(window.state.works);
  if (works.length === 0) { toast('⚠️ 作品を登録してください'); return; }

  const records = {};
  let hasData = false;

  works.forEach(w => {
    const salesEl = document.getElementById(`sales_${w.id}`);
    const favEl = document.getElementById(`fav_${w.id}`);
    if (salesEl && favEl && (salesEl.value !== '' || favEl.value !== '')) {
      records[w.id] = { sales: Number(salesEl.value) || 0, fav: Number(favEl.value) || 0 };
      hasData = true;
    }
  });

  if (!hasData) { toast('⚠️ データを入力してください'); return; }

  const snap = { ts: new Date(ts).toISOString(), records };
  await window.firebasePush(window.firebaseRef(window.firebaseDb, 'dashboard/snapshots'), snap);
  toast(`✅ 保存しました（${Object.keys(records).length}作品）`);
  togglePanel();
}

async function clearAllData() {
  if (!confirm('全データを削除しますか？')) return;
  await saveToFirebase('dashboard', null);
  toast('🗑️ 全データを削除しました');
}

// Render
function setMetric(m, btn) {
  currentMetric = m;
  btn.parentElement.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderChart();
}

function setSortTable(s, btn) {
  currentSort = s;
  btn.parentElement.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderTable();
}

function renderChart() {
  const ctx = document.getElementById('mainChart');
  const selectedWork = document.getElementById('chartWorkSelect').value;
  const sorted = [...window.state.snapshots].sort((a,b) => new Date(a.ts) - new Date(b.ts));
  if (sorted.length === 0) return;

  const labels = sorted.map(s => {
    const d = new Date(s.ts);
    return `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
  });

  let datasets = [];
  if (selectedWork === '__all__') {
    const data = sorted.map(s => Object.values(s.records || {}).reduce((sum, r) => sum + Number(r[currentMetric] || 0), 0));
    datasets = [{ label: '全作品合計', data, borderColor: '#e8407a', backgroundColor: 'rgba(232,64,122,0.1)', fill: true, tension: 0.4, pointRadius: 4 }];
  } else {
    const work = window.state.works[selectedWork];
    const color = getWorkColor(selectedWork);
    const data = sorted.map(s => Number(s.records?.[selectedWork]?.[currentMetric] || 0));
    datasets = [{ label: work?.title || selectedWork, data, borderColor: color, backgroundColor: color + '22', fill: true, tension: 0.4, pointRadius: 4 }];
  }

  if (chartInstance) chartInstance.destroy();
  chartInstance = new Chart(ctx, {
    type: 'line', data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { labels: { color: '#8888aa', font: { family: 'JetBrains Mono', size: 11 } } },
        tooltip: { backgroundColor: '#1a1a24', borderColor: '#2a2a3a', borderWidth: 1, titleColor: '#e8e8f0', bodyColor: '#8888aa' }
      },
      scales: {
        x: { ticks: { color: '#555577', font: { family: 'JetBrains Mono', size: 10 } }, grid: { color: '#1e1e2e' } },
        y: { ticks: { color: '#555577', font: { family: 'JetBrains Mono', size: 10 }, callback: v => v.toLocaleString() }, grid: { color: '#1e1e2e' } }
      }
    }
  });
}

function renderTable() {
  const container = document.getElementById('worksTableContainer');
  const works = Object.values(window.state.works);
  if (works.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="emoji">🎮</div><p>作品データがありません</p><button class="btn btn-primary" onclick="togglePanel()">データ入力</button></div>`;
    return;
  }

  const sorted_snaps = [...window.state.snapshots].sort((a,b) => new Date(b.ts) - new Date(a.ts));
  const latest = sorted_snaps[0];
  const prev = sorted_snaps[1];

  const stats = works.map(w => {
    const l = latest?.records?.[w.id] || {};
    const p = prev?.records?.[w.id] || {};
    return { ...w, sales: Number(l.sales||0), fav: Number(l.fav||0), salesDelta: Number(l.sales||0) - Number(p.sales||0), favDelta: Number(l.fav||0) - Number(p.fav||0) };
  });

  if (currentSort === 'sales') stats.sort((a,b) => b.sales - a.sales);
  else if (currentSort === 'fav') stats.sort((a,b) => b.fav - a.fav);
  else stats.sort((a,b) => b.salesDelta - a.salesDelta);

  const deltaHTML = d => {
    if (d > 0) return `<span class="delta-pill delta-up">+${d.toLocaleString()}</span>`;
    if (d < 0) return `<span class="delta-pill delta-down">${d.toLocaleString()}</span>`;
    return `<span class="delta-zero">—</span>`;
  };

  const rankBadge = i => {
    const cls = i===0?'rank-1':i===1?'rank-2':i===2?'rank-3':'rank-other';
    return `<div class="rank-badge ${cls}">${i+1}</div>`;
  };

  container.innerHTML = `<table class="works-table">
    <thead><tr><th>#</th><th>作品</th><th>販売数</th><th>増減</th><th>お気に入り</th><th>増減</th></tr></thead>
    <tbody>${stats.map((w,i) => `<tr>
      <td>${rankBadge(i)}</td>
      <td><div class="work-title-cell">${escapeHtml(w.title)}</div><span class="work-id">${w.id}</span></td>
      <td class="num-cell">${w.sales.toLocaleString()}</td>
      <td>${deltaHTML(w.salesDelta)}</td>
      <td class="num-cell">${w.fav.toLocaleString()}</td>
      <td>${deltaHTML(w.favDelta)}</td>
    </tr>`).join('')}</tbody>
  </table>`;
}

function renderRanking() {
  const el = document.getElementById('rankingList');
  const works = Object.values(window.state.works);
  if (works.length === 0) { el.innerHTML = '<div style="color:var(--text2);font-size:0.82rem;text-align:center;padding:1rem 0;">データなし</div>'; return; }

  const sorted_snaps = [...window.state.snapshots].sort((a,b) => new Date(b.ts) - new Date(a.ts));
  const latest = sorted_snaps[0];

  const stats = works.map(w => ({ ...w, sales: Number(latest?.records?.[w.id]?.sales || 0) }))
    .sort((a,b) => b.sales - a.sales).slice(0, 5);

  const medals = ['🥇','🥈','🥉','4️⃣','5️⃣'];
  el.innerHTML = stats.map((w,i) => `
    <div class="rank-item">
      <div style="font-size:1.3rem;line-height:1;">${medals[i]}</div>
      <div class="rank-info">
        <div class="rank-name">${escapeHtml(w.title)}</div>
        <div class="rank-sub">${w.id}</div>
      </div>
      <div class="rank-sales">${w.sales.toLocaleString()}</div>
    </div>`).join('');
}

function renderStats() {
  const sorted = [...window.state.snapshots].sort((a,b) => new Date(b.ts) - new Date(a.ts));
  const latest = sorted[0];
  const prev = sorted[1];
  const sum = (snap, f) => snap ? Object.values(snap.records||{}).reduce((s,r) => s+Number(r[f]||0), 0) : 0;

  const totalSales = sum(latest, 'sales');
  const totalFav = sum(latest, 'fav');
  document.getElementById('totalSales').textContent = totalSales.toLocaleString();
  document.getElementById('totalFav').textContent = totalFav.toLocaleString();
  document.getElementById('totalWorks').textContent = Object.keys(window.state.works).length;
  document.getElementById('totalSnapshots').textContent = window.state.snapshots.length;

  const deltaEl = (id, d) => {
    const el = document.getElementById(id);
    if (!el) return;
    if (d > 0) { el.className = 'stat-delta up'; el.textContent = `+${d.toLocaleString()} 前回比`; }
    else if (d < 0) { el.className = 'stat-delta down'; el.textContent = `${d.toLocaleString()} 前回比`; }
    else { el.className = 'stat-delta'; el.textContent = prev ? '変化なし' : ''; }
  };
  deltaEl('totalSalesDelta', totalSales - sum(prev, 'sales'));
  deltaEl('totalFavDelta', totalFav - sum(prev, 'fav'));

  if (latest) document.getElementById('lastUpdate').textContent = new Date(latest.ts).toLocaleString('ja-JP');
}

function renderRecent() {
  const el = document.getElementById('recentList');
  const sorted = [...window.state.snapshots].sort((a,b) => new Date(b.ts) - new Date(a.ts)).slice(0,5);
  if (sorted.length === 0) { el.textContent = '記録なし'; return; }
  el.innerHTML = sorted.map(s => {
    const dt = new Date(s.ts).toLocaleString('ja-JP');
    const total = Object.values(s.records||{}).reduce((sum,r) => sum+Number(r.sales||0), 0);
    return `<div style="padding:0.5rem 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;">
      <div><div style="font-size:0.82rem;color:var(--text);">${dt}</div><div style="font-size:0.7rem;margin-top:2px;">${Object.keys(s.records||{}).length}作品</div></div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:0.85rem;color:var(--accent3);">${total.toLocaleString()}</div>
    </div>`;
  }).join('');
}

function updateChartSelector() {
  const sel = document.getElementById('chartWorkSelect');
  const current = sel.value;
  sel.innerHTML = '<option value="__all__">全作品合計</option>';
  Object.values(window.state.works).forEach(w => {
    const opt = document.createElement('option');
    opt.value = w.id; opt.textContent = `${w.id} - ${w.title}`;
    sel.appendChild(opt);
  });
  if (current && sel.querySelector(`option[value="${current}"]`)) sel.value = current;
}

function renderAll() {
  renderStats();
  renderChart();
  renderTable();
  renderRanking();
  renderRecent();
  updateChartSelector();
}

function togglePanel() {
  document.getElementById('inputPanel').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('show');
  if (document.getElementById('inputPanel').classList.contains('open')) {
    const now = new Date();
    now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
    document.getElementById('snapDate').value = now.toISOString().slice(0,16);
    populateWorkEntries();
  }
}

function populateWorkEntries() {
  const container = document.getElementById('workEntries');
  const works = Object.values(window.state.works);
  if (works.length === 0) { container.innerHTML = '<p style="color:var(--text2);font-size:0.82rem;margin-bottom:1rem;">先に作品を登録してください ↓</p>'; return; }
  container.innerHTML = works.map(w => `
    <div class="work-entry">
      <div class="work-entry-title">${escapeHtml(w.title)} <span style="font-family:monospace;font-size:0.7rem;color:var(--text2)">${w.id}</span></div>
      <div class="input-row" style="margin-top:0.6rem;">
        <div><label class="form-label">販売数</label><input type="number" class="form-input" id="sales_${w.id}" placeholder="0"></div>
        <div><label class="form-label">お気に入り</label><input type="number" class="form-input" id="fav_${w.id}" placeholder="0"></div>
      </div>
    </div>`).join('');
}

function exportCSV() {
  const works = Object.values(window.state.works);
  if (works.length === 0) { toast('⚠️ データがありません'); return; }
  const sorted = [...window.state.snapshots].sort((a,b) => new Date(a.ts) - new Date(b.ts));
  const header = ['日時', ...works.flatMap(w => [`${w.id}_販売数`, `${w.id}_お気に入り`])];
  const rows = sorted.map(s => [new Date(s.ts).toLocaleString('ja-JP'), ...works.flatMap(w => [s.records?.[w.id]?.sales||0, s.records?.[w.id]?.fav||0])]);
  const csv = [header,...rows].map(r => r.map(v => `"${v}"`).join(',')).join('\n');
  const blob = new Blob(['\uFEFF'+csv], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `dlsite_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  toast('✅ CSVエクスポート完了');
}
</script>
</body>
</html>
