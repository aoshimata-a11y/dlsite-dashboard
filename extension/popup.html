<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>DLsite Dashboard</title>
<link rel="stylesheet" href="popup.css">
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-dot"></div>
    DLsite Dashboard
  </div>
  <div class="auth-info" id="authInfo">
    <div class="auth-dot offline" id="authDot"></div>
    <span id="authLabel">未ログイン</span>
  </div>
</div>

<div id="loginPanel" class="login-panel" style="display:none;">
  <p>Googleアカウントでログインすると<br>Firebaseにデータを保存できます</p>
  <button class="btn btn-primary btn-full" id="loginBtn">
    Googleでログイン
  </button>
</div>

<div id="mainPanel" style="display:none;">
  <div class="tabs">
    <button class="tab active" data-tab="capture">キャプチャ</button>
    <button class="tab" data-tab="csv">CSVインポート</button>
    <button class="tab" data-tab="register">作品登録</button>
  </div>

  <!-- キャプチャタブ -->
  <div class="content" id="tab-capture">
    <div style="display:flex; gap:8px; margin-bottom:12px;">
      <button class="btn btn-primary" id="captureAllBtn" style="flex:1;">
        ↻ 全作品を更新
      </button>
      <button class="btn" id="capturePageBtn">
        現在のページ
      </button>
    </div>
    <div class="progress-bar" id="progressBar" style="display:none;">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
    <div class="status-msg" id="captureStatus"></div>

    <div class="section-title" style="margin-top:4px;">登録作品</div>
    <div id="workList">
      <div class="status-msg">読み込み中...</div>
    </div>
  </div>

  <!-- CSVインポートタブ -->
  <div class="content" id="tab-csv" style="display:none;">
    <div class="section-title">DLsite管理画面CSVをインポート</div>
    <div class="csv-drop-area" id="csvDropArea">
      <div>📂 CSVファイルをドロップ</div>
      <div style="font-size:10px;margin-top:6px;">またはクリックして選択</div>
      <input type="file" id="csvFileInput" accept=".csv">
    </div>
    <div id="csvPreview" style="display:none;">
      <div class="section-title">プレビュー（先頭5行）</div>
      <div id="csvPreviewTable" style="overflow-x:auto;font-size:11px;font-family:monospace;"></div>
      <div class="form-group" style="margin-top:8px;">
        <div class="form-label">列マッピング</div>
        <div class="input-row" style="grid-template-columns:1fr 1fr 1fr;">
          <div>
            <div class="form-label">作品ID列</div>
            <select class="form-input" id="colWorkId"></select>
          </div>
          <div>
            <div class="form-label">販売本数列</div>
            <select class="form-input" id="colSales"></select>
          </div>
          <div>
            <div class="form-label">販売額列</div>
            <select class="form-input" id="colAmount"></select>
          </div>
        </div>
        <div class="input-row" style="grid-template-columns:1fr 1fr; margin-top:6px;">
          <div>
            <div class="form-label">卸価格列</div>
            <select class="form-input" id="colWholesale"></select>
          </div>
          <div>
            <div class="form-label">日付列（任意）</div>
            <select class="form-input" id="colDate"></select>
          </div>
        </div>
      </div>
      <button class="btn btn-primary btn-full" id="csvImportBtn">
        インポート実行
      </button>
    </div>
    <div class="status-msg" id="csvStatus"></div>
  </div>

  <!-- 作品登録タブ -->
  <div class="content" id="tab-register" style="display:none;">
    <div class="section-title">作品を登録</div>
    <div class="form-group">
      <label class="form-label">作品ID (例: RJ123456)</label>
      <input type="text" class="form-input" id="regWorkId" placeholder="RJxxxxxxx">
    </div>
    <div class="form-group">
      <label class="form-label">作品タイトル</label>
      <input type="text" class="form-input" id="regTitle" placeholder="作品名を入力">
    </div>
    <div class="form-group">
      <label class="form-label">発売日</label>
      <input type="date" class="form-input" id="regReleaseDate">
    </div>
    <div class="form-group">
      <label class="form-label">ステータス</label>
      <select class="form-input" id="regIsReleased">
        <option value="true">発売済み</option>
        <option value="false">発売前</option>
      </select>
    </div>
    <button class="btn btn-primary btn-full" id="regBtn">
      作品を登録
    </button>
    <div class="status-msg" id="regStatus"></div>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
